<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
    <link rel="stylesheet" type="text/css" href="todo.css">
</head>
<body>

<div class="todo-container">
    <h1>My To-Do List</h1>

    <input type="text" class="add-task" placeholder="Write your task here...">

    <div class="task">
        <input type="checkbox" id="task1">
        <label for="task1">Complete HTML Assignment</label>
    </div>

    <div class="task">
        <input type="checkbox" id="task2">
        <label for="task2">Study Data Structures</label>
    </div>

    <div class="task">
        <input type="checkbox" id="task3">
        <label for="task3">Prepare for CSIT Exam</label>
    </div>

    <div class="task">
        <input type="checkbox" id="task4">
        <label for="task4">Submit College Project</label>
    </div>

</div>

</body>
</html>
